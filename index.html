<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INADI - Recursos V2</title>

  <!-- ═══════════════════════════════════════════════════════════════════
       SECURITY HEADERS (via meta — GitHub Pages no soporta HTTP headers)
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- Content Security Policy:
       - default-src 'self'              → bloquea recursos de orígenes no listados
       - script-src 'self'               → solo scripts propios (config.js, app.js)
       - style-src  'self'               → solo hojas de estilo propias
       - connect-src ...                 → permite fetch al backend de Google (incluyendo redirecciones) y a localhost para Live Server
       - img-src 'self'                  → solo imágenes propias
       - object-src 'none'              → bloquea <object>, <embed>, <applet>
       - base-uri 'self'                → previene inyección de <base href> 
       - form-action 'self'             → previene exfiltración via forms
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline';
    style-src   'self' 'unsafe-inline';
    connect-src https://script.google.com https://script.googleusercontent.com http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*;
    img-src     'self' data:;
    object-src  'none';
    base-uri    'self';
    form-action 'self';
  ">

  <!-- Previene MIME sniffing (content-type confusion attacks) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- Referrer: no enviar URL al navegar a recursos externos -->
  <meta name="referrer" content="no-referrer">

  <!-- Deshabilitar APIs de hardware innecesarias -->
  <meta http-equiv="Permissions-Policy"
        content="geolocation=(), microphone=(), camera=(), payment=(), usb=()">

  <!-- Cache: no almacenar en caché (protege sesiones en equipos compartidos) -->
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma"        content="no-cache">
  <meta http-equiv="Expires"       content="0">

  <!-- ═══════════════════════════════════════════════════════════════════
       SEO / META
       ═══════════════════════════════════════════════════════════════════ -->
  <meta name="description" content="Portal de recursos educativos INADI - GameMaker">
  <meta name="robots"      content="noindex, nofollow">

  <!-- ═══════════════════════════════════════════════════════════════════
       ESTILOS
       ═══════════════════════════════════════════════════════════════════ -->
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <!-- LOGIN -->

  <section id="loginScreen">

    <div class="login-card">

      <img src="Logo Inadi con Brillo.png" class="logo" alt="Logo INADI">

      <h1>GAMEMAKER</h1>

      <p class="subtitle">
        Portal de Recursos Educativos
      </p>

      <div class="input-group">

        <label for="username">Nombre y apellido</label>

        <input
          type="text"
          id="username"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Ej: Lucas Rangel"
          maxlength="80"
        >

        <div id="loginError" class="login-error" role="alert" aria-live="polite"></div>

      </div>

      <button class="btn" id="loginBtn" onclick="login()">
        Ingresar
      </button>

      <div class="members">
        Ingresá con tu nombre y apellido para iniciar
      </div>

    </div>

  </section>

  <!-- PANEL -->

  <section id="panel" class="hidden">

    <div class="topbar">

      <div class="welcome">

        <img src="Logo Inadi con Brillo.png" alt="Logo INADI">

        <div>
          <h2 id="welcomeText"></h2>
          <span class="badge" id="roleBadge"></span>
        </div>

      </div>

      <button class="logout" onclick="logout()">
        Cerrar sesión
      </button>

    </div>

    <div id="resourcesContainer" class="resources-container"></div>

    <div id="emptyMessage" class="empty">
      No hay recursos agregados todavía.
    </div>

    <button
      id="addButton"
      class="add-btn hidden"
      onclick="openModal()"
      aria-label="Agregar recurso">
      +
    </button>

  </section>

  <!-- MODAL -->

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">

    <div class="modal-content">

      <h3 id="modalTitle">Agregar recurso</h3>

      <div class="input-group">
        <label for="resourceName">Nombre del recurso</label>
        <input
          type="text"
          id="resourceName"
          placeholder="Ej: Tutorial GameMaker"
          maxlength="120"
          autocomplete="off"
        >
      </div>

      <div class="input-group">
        <label for="resourceLink">Link</label>
        <input
          type="url"
          id="resourceLink"
          placeholder="https://..."
          maxlength="2048"
          autocomplete="off"
        >
      </div>

      <div id="modalError" class="modal-error" role="alert" aria-live="polite"></div>

      <div class="modal-buttons">

        <button class="btn secondary" onclick="closeModal()">
          Cancelar
        </button>

        <button class="btn" onclick="addResource()">
          Guardar
        </button>

      </div>

    </div>

  </div>

  <!-- ═══════════════════════════════════════════════════════════════════
       SCRIPTS — cargados al final, sin inline JS
       config.js primero (define _cfg), luego app.js (lo consume)
       ═══════════════════════════════════════════════════════════════════ -->
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
