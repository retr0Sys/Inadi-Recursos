<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INADI - Recursos V2</title>

  <!-- Google Fonts — Inter para legibilidad premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════════════════════════════
       SECURITY HEADERS (via meta — GitHub Pages no soporta HTTP headers)
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- Content Security Policy
       OWASP A05 · NIST SI-10 · CIS Control 9
       Cambios vs v1:
         · Eliminado 'unsafe-inline' de script-src y style-src
         · Agregado upgrade-insecure-requests (NIST SP 800-95)
         · NOTA: frame-ancestors NO funciona via <meta>; se aplica solo
                 via HTTP header. El frameGuard en JS cubre esta brecha.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self';
    style-src   'self' https://fonts.googleapis.com;
    font-src    https://fonts.gstatic.com;
    connect-src https://script.google.com https://script.googleusercontent.com http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*;
    img-src     'self' data:;
    object-src  'none';
    base-uri    'self';
    form-action 'self';
    upgrade-insecure-requests;
  ">

  <!-- Previene MIME sniffing — OWASP A05 / NIST SI-3 -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- Anti-clickjacking redundante (frame-ancestors no aplica en meta) — CIS 12 -->
  <meta http-equiv="X-Frame-Options" content="DENY">

  <!-- Referrer: no enviar URL al navegar a recursos externos — ISO 27001 A.13 -->
  <meta name="referrer" content="no-referrer">

  <!-- Deshabilitar APIs de hardware innecesarias — CIS Control 4 / NIST CM-7 -->
  <meta http-equiv="Permissions-Policy"
        content="geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()">

  <!-- Cache: no almacenar en caché — NIST AC-12 / CIS Control 16 -->
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma"        content="no-cache">
  <meta http-equiv="Expires"       content="0">

  <!-- Cross-Origin Opener Policy — aislamiento de proceso — OWASP A05 -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">

  <!-- ═══════════════════════════════════════════════════════════════════
       SEO / META
       ═══════════════════════════════════════════════════════════════════ -->
  <meta name="description" content="Portal de recursos educativos INADI - GameMaker">
  <meta name="robots"      content="noindex, nofollow">

  <!-- ═══════════════════════════════════════════════════════════════════
       ESTILOS
       ═══════════════════════════════════════════════════════════════════ -->
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <!-- Fallback sin JavaScript — WCAG 2.1 / ISO 27001 A.18 -->
  <noscript>
    <div style="text-align:center;padding:60px;color:#fff;background:#09111f;min-height:100vh;font-family:sans-serif;">
      <h1>JavaScript requerido</h1>
      <p style="margin-top:16px;opacity:0.7;">Este portal requiere JavaScript para funcionar de forma segura. Activalo en tu navegador.</p>
    </div>
  </noscript>

  <!-- LOGIN -->

  <section id="loginScreen">

    <div class="login-card">

      <img src="Logo Inadi con Brillo.png" class="logo" alt="Logo INADI">

      <h1>GAMEMAKER</h1>

      <p class="subtitle">
        Portal de Recursos Educativos
      </p>

      <div class="input-group">

        <label for="username">Nombre y apellido</label>

        <input
          type="text"
          id="username"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Ej: Lucas Rangel"
          maxlength="80"
        >

        <div id="loginError" class="login-error" role="alert" aria-live="polite"></div>

      </div>

      <button class="btn" id="loginBtn">
        Ingresar
      </button>

      <div class="members">
        Ingresá con tu nombre y apellido para iniciar
      </div>

    </div>

  </section>

  <!-- PANEL -->

  <section id="panel" class="hidden">

    <div class="topbar">

      <div class="welcome">

        <img src="Logo Inadi con Brillo.png" alt="Logo INADI">

        <div>
          <h2 id="welcomeText"></h2>
          <span class="badge" id="roleBadge"></span>
        </div>

      </div>

      <div class="topbar-right">
        <span id="sessionTimer" class="session-timer" aria-live="polite" title="Tiempo de sesión restante"></span>
        <button class="logout" id="logoutBtn">
          Cerrar sesión
        </button>
      </div>

    </div>

    <!-- Barra de búsqueda -->
    <div class="search-wrapper">
      <input
        type="search"
        id="searchInput"
        placeholder="🔍  Buscar recursos…"
        maxlength="120"
        autocomplete="off"
        aria-label="Buscar recursos"
      >
    </div>

    <div id="resourcesContainer" class="resources-container"></div>

    <div id="emptyMessage" class="empty">
      No hay recursos agregados todavía.
    </div>

    <button
      id="addButton"
      class="add-btn hidden"
      aria-label="Agregar recurso">
      +
    </button>

  </section>

  <!-- MODAL -->

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">

    <div class="modal-content">

      <h3 id="modalTitle">Agregar recurso</h3>

      <div class="input-group">
        <label for="resourceName">Nombre del recurso</label>
        <input
          type="text"
          id="resourceName"
          placeholder="Ej: Tutorial GameMaker"
          maxlength="120"
          autocomplete="off"
        >
      </div>

      <div class="input-group">
        <label for="resourceLink">Link</label>
        <input
          type="url"
          id="resourceLink"
          placeholder="https://..."
          maxlength="2048"
          autocomplete="off"
        >
      </div>

      <div id="modalError" class="modal-error" role="alert" aria-live="polite"></div>

      <div class="modal-buttons">

        <button class="btn secondary" id="cancelBtn">
          Cancelar
        </button>

        <button class="btn" id="saveBtn">
          Guardar
        </button>

      </div>

    </div>

  </div>

  <!-- Toast notifications container -->
  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ═══════════════════════════════════════════════════════════════════
       SCRIPTS — cargados al final, sin inline JS
       config.js primero (define _cfg), luego app.js (lo consume)
       ═══════════════════════════════════════════════════════════════════ -->
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
